defaults:
  - data: ssl_cv

epochs: 2000
ckpt_path: ckpt.yaml
compressor:
  inits:
    rms_avg: 0.3
    threshold: -10.0
    ratio: 2
    attack_ms: 50
    release_ms: 50
    make_up_gain: 0
  delay: 0
  init_config: null
  spsa: false

optimiser:
  _target_: torch.optim.Adam
  lr: 0.01

scheduler:
  _target_: torch.optim.lr_scheduler.ReduceLROnPlateau
  mode: min
  factor: 0.5
  patience: 25
  threshold: 1e-4
  min_lr: 1e-5

loss_signal: audio   # audio | cv

loss_fn:
  _target_: torch.nn.L1Loss
  reduction: mean

#  _target_: losses.MSTELoss
#  frame_lengths: [ 8, 16, 32, 64 ]
#  overlap: 0.75



wandb_init:
  project: dafx24
